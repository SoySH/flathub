app-id: com.ralf.controlps
runtime: org.kde.Platform
runtime-version: "6.10"
sdk: org.kde.Sdk
base: io.qt.PySide.BaseApp
base-version: "6.10"
command: control_ps

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --socket=system-bus
  - --filesystem=xdg-run/pipewire-0
  - --device=input
  - --talk-name=org.freedesktop.UPower
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: python3-dbus-python
    buildsystem: autotools
    sources:
      - type: archive
        url: https://dbus.freedesktop.org/releases/dbus-python/dbus-python-1.3.2.tar.gz
        sha256: ad67819308618b5069537be237f8e68ca1c7fcc95ee4a121fe6845b1418248f8

  - name: ControlPS
    buildsystem: simple
    build-commands:
      # 💡 Importante: Se instala el archivo 'main.py' que viene dentro del tar.gz de GitHub
      - install -Dm755 main.py /app/bin/control_ps

      - mkdir -p /app/bin/assets
      - install -Dm644 assets/player.svg /app/bin/assets/player.svg
      - install -Dm644 assets/connect.wav /app/bin/assets/connect.wav
      - install -Dm644 assets/disconnect.wav /app/bin/assets/disconnect.wav
      - install -Dm644 assets/50.wav /app/bin/assets/50.wav
      - install -Dm644 assets/100.wav /app/bin/assets/100.wav

      # Icono del sistema requerido por el menú de aplicaciones
      - install -Dm644 icon.png /app/share/icons/hicolor/256x256/apps/com.ralf.controlps.png

      # Lanzadores requeridos para aparecer en el menú
      - install -Dm644 com.ralf.controlps.desktop /app/share/applications/com.ralf.controlps.desktop
      - install -Dm644 com.ralf.controlps.metainfo.xml /app/share/metainfo/com.ralf.controlps.metainfo.xml
    sources:
      - type: archive
        url: https://github.com/SoySH/ControlPS/archive/refs/tags/v1.0.0.tar.gz
        sha256: 2a1c43e72759a90b3cd04087ac81405328d1e18af9b68e52c7ad305e07e46690
